name: Sync secrets → Vercel

# Runs automatically when you push to main,
# or manually from Actions tab (with optional dry-run).
#
# Setup (one-time):
#   GitHub repo → Settings → Secrets and variables → Actions
#     VERCEL_API_TOKEN  = your Vercel token  ← already set ✓
#
# To add a new secret to sync:
#   1. Add it under GitHub repo secrets
#   2. Add a line in the SECRETS_MAP below

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — show what would change, skip apply'
        type: boolean
        default: false
  push:
    branches: [main]
    paths:
      - '.github/workflows/sync-secrets-to-vercel.yml'

concurrency:
  group: sync-vercel-secrets
  cancel-in-progress: true

jobs:
  sync:
    name: Push GitHub secrets → Vercel env vars
    runs-on: ubuntu-latest
    steps:
      - name: Sync secrets to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_API_TOKEN }}
          VERCEL_PROJECT_ID: prj_Nchhz0q53FNwy50LyvDiF1cLyZWK
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
          # ── Add each GitHub secret you want to sync here ──────────────────
          SECRET_ADMIN_KEY:        ${{ secrets.ADMIN_KEY }}
          SECRET_DATABASE_URL:     ${{ secrets.DATABASE_URL }}
          SECRET_GITHUB_REPO:      ${{ secrets.GH_REPO_FULL }}
          SECRET_GITHUB_BOT_TOKEN: ${{ secrets.GH_BOT_TOKEN }}
          # SECRET_CRON_SECRET: ${{ secrets.CRON_SECRET }}   # uncomment when ready
          # ──────────────────────────────────────────────────────────────────
        run: |
          node << 'EOF'
          const https = require('https');

          const PROJECT_ID = process.env.VERCEL_PROJECT_ID;
          const TOKEN      = process.env.VERCEL_TOKEN;
          const DRY_RUN    = process.env.DRY_RUN === 'true';

          // ── Map: env var name → Vercel key + target environments ──────────
          const SECRETS_MAP = {
            SECRET_ADMIN_KEY:        { key: 'ADMIN_KEY',        target: ['production','preview','development'] },
            SECRET_DATABASE_URL:     { key: 'DATABASE_URL',     target: ['production','preview','development'] },
            SECRET_GITHUB_REPO:      { key: 'GITHUB_REPO',      target: ['production','preview','development'] },
            SECRET_GITHUB_BOT_TOKEN: { key: 'GITHUB_BOT_TOKEN', target: ['production','preview','development'] },
            // SECRET_CRON_SECRET: { key: 'CRON_SECRET',  target: ['production','preview','development'] },
          };
          // ──────────────────────────────────────────────────────────────────

          function api(method, path, body) {
            return new Promise((resolve, reject) => {
              const payload = body ? JSON.stringify(body) : null;
              const req = https.request({
                hostname: 'api.vercel.com',
                path,
                method,
                headers: {
                  Authorization: `Bearer ${TOKEN}`,
                  'Content-Type': 'application/json',
                  ...(payload ? { 'Content-Length': Buffer.byteLength(payload) } : {}),
                },
              }, res => {
                let data = '';
                res.on('data', d => (data += d));
                res.on('end', () => resolve({ status: res.statusCode, body: JSON.parse(data) }));
              });
              req.on('error', reject);
              if (payload) req.write(payload);
              req.end();
            });
          }

          (async () => {
            console.log(`Mode: ${DRY_RUN ? 'DRY RUN' : 'LIVE'}\n`);

            const { body } = await api('GET', `/v9/projects/${PROJECT_ID}/env`);
            const existing = {};
            for (const e of body.envs || []) existing[e.key] = e.id;

            let synced = 0, skipped = 0, errors = 0;

            for (const [envVar, { key, target }] of Object.entries(SECRETS_MAP)) {
              const value = process.env[envVar];
              if (!value) {
                console.log(`⏭  ${key} — GitHub secret not set, skipping`);
                skipped++;
                continue;
              }
              if (DRY_RUN) {
                const action = existing[key] ? 'update' : 'create';
                console.log(`🔍 [DRY RUN] Would ${action} → ${key}`);
                continue;
              }
              try {
                if (existing[key]) {
                  const r = await api('PATCH', `/v9/projects/${PROJECT_ID}/env/${existing[key]}`, { value, target, type: 'encrypted' });
                  if (r.status === 200) { console.log(`✅ Updated  ${key}`); synced++; }
                  else { console.log(`❌ Failed   ${key} (HTTP ${r.status})`, JSON.stringify(r.body)); errors++; }
                } else {
                  const r = await api('POST', `/v9/projects/${PROJECT_ID}/env`, { key, value, target, type: 'encrypted' });
                  if (r.status === 200 || r.status === 201) { console.log(`✅ Created  ${key}`); synced++; }
                  else { console.log(`❌ Failed   ${key} (HTTP ${r.status})`, JSON.stringify(r.body)); errors++; }
                }
              } catch (err) {
                console.log(`❌ Error    ${key}:`, err.message);
                errors++;
              }
            }

            console.log(`\n── Summary ──────────────────────────`);
            console.log(`   Synced:  ${synced}`);
            console.log(`   Skipped: ${skipped}`);
            console.log(`   Errors:  ${errors}`);
            if (errors > 0) process.exit(1);
          })();
          EOF
