name: Verify WhatsApp links

# Free, hourly link-health agent. Hits /api/cron/verify with the admin key.
# The endpoint already handles:
#   - Reset / revoked invite links (immediate hard-remove)
#   - Deleted groups (no metadata / generic preview without members → soft
#     broken; removed after 24h grace)
#   - Rate-limit / 5xx (skip + retry next hour)
#   - Recovered links (broken_since cleared automatically)
on:
  schedule:
    - cron: "0 * * * *"   # every hour, on the hour, UTC
  workflow_dispatch:
    inputs:
      limit:
        description: "Max groups to check this run (1-100)"
        required: false
        default: "50"
      delay:
        description: "Delay between requests in ms (0-5000)"
        required: false
        default: "800"
      graceHours:
        description: "Hours a soft-broken link must persist before removal (1-168)"
        required: false
        default: "24"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      API_BASE_URL: ${{ secrets.API_BASE_URL }}
      ADMIN_KEY: ${{ secrets.ADMIN_KEY }}
      LIMIT: ${{ github.event.inputs.limit || '50' }}
      DELAY: ${{ github.event.inputs.delay || '800' }}
      GRACE_HOURS: ${{ github.event.inputs.graceHours || '24' }}
    steps:
      - name: Hit verify endpoint
        run: |
          set -e
          if [ -z "$API_BASE_URL" ] || [ -z "$ADMIN_KEY" ]; then
            echo "API_BASE_URL or ADMIN_KEY secret missing — skipping."
            exit 1
          fi
          URL="${API_BASE_URL%/}/api/cron/verify?limit=${LIMIT}&delay=${DELAY}&graceHours=${GRACE_HOURS}"
          echo "Hitting $URL"
          # Capture both body and HTTP status
          HTTP_CODE=$(curl -sS -o /tmp/resp.json -w "%{http_code}" \
            -H "x-admin-key: $ADMIN_KEY" \
            "$URL")
          echo "HTTP $HTTP_CODE"
          cat /tmp/resp.json
          echo
          if [ "$HTTP_CODE" != "200" ]; then
            exit 1
          fi
          # Pretty summary in the workflow log
          node -e "
            const r = require('/tmp/resp.json');
            console.log('checked:    ', r.checked);
            console.log('removed:    ', r.removed);
            console.log('softBroken: ', r.softBroken);
            console.log('recovered:  ', r.recovered);
            console.log('skipped:    ', r.skipped);
            console.log('graceHours: ', r.graceHours);
          "
