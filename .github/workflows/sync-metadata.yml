name: Sync group metadata

# Continuously refreshes group display name and DP image from WhatsApp.
# This is metadata-only — it never removes groups (that's what the
# hourly-verify workflow is for).
#
# Schedule: every 5 minutes (GitHub Actions minimum). Each run keeps
# looping back-to-back sync calls for ~5 minutes, so coverage is
# effectively continuous.
#
# Setup (one-time):
#   GitHub repo -> Settings -> Secrets and variables -> Actions
#     SITE_URL    = https://whatsapp-otp-group.vercel.app   (no trailing slash)
#     ADMIN_KEY   = <same value as the ADMIN_KEY env var on Vercel>
#
# Tunables:
#   BATCH_LIMIT  - groups synced per request  (default 15)
#   BATCH_DELAY  - ms between WhatsApp fetches inside one request (default 600)
#   PAUSE        - seconds to wait between batches inside this run (default 15)
#   RUN_SECONDS  - how long this run keeps looping batches (default 270, ~4.5 min)

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

concurrency:
  group: sync-metadata
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SITE_URL: ${{ secrets.SITE_URL }}
      ADMIN_KEY: ${{ secrets.ADMIN_KEY }}
      BATCH_LIMIT: "15"
      BATCH_DELAY: "600"
      PAUSE: "15"
      RUN_SECONDS: "270"
    steps:
      - name: Sanity check secrets
        run: |
          if [ -z "$SITE_URL" ]; then
            echo "::error::SITE_URL secret is not set"
            exit 1
          fi
          if [ -z "$ADMIN_KEY" ]; then
            echo "::error::ADMIN_KEY secret is not set"
            exit 1
          fi

      - name: Continuous sync loop
        run: |
          set -u
          START=$(date +%s)
          DEADLINE=$(( START + RUN_SECONDS ))
          BATCH=0
          while :; do
            NOW=$(date +%s)
            if [ "$NOW" -ge "$DEADLINE" ]; then
              echo "Hit RUN_SECONDS budget, exiting loop."
              break
            fi
            BATCH=$(( BATCH + 1 ))
            echo "::group::Batch #$BATCH (elapsed $((NOW - START))s)"
            URL="${SITE_URL%/}/api/cron/sync?limit=${BATCH_LIMIT}&delay=${BATCH_DELAY}"
            HTTP_CODE=$(curl -sS -o /tmp/resp.json -w "%{http_code}" \
              -H "x-admin-key: $ADMIN_KEY" \
              --max-time 120 \
              "$URL" || echo "000")
            echo "HTTP $HTTP_CODE"
            head -c 2000 /tmp/resp.json || true
            echo ""
            echo "::endgroup::"
            sleep "$PAUSE"
          done
