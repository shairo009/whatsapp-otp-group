name: Sync group metadata

# Hits /api/cron/sync regularly to refresh group display name and DP image
# from WhatsApp. This is metadata-only — it never removes groups (that's
# what the hourly-verify workflow is for).
#
# Setup (one-time):
#   GitHub repo -> Settings -> Secrets and variables -> Actions
#     SITE_URL    = https://whatsapp-otp-group.vercel.app   (no trailing slash)
#     ADMIN_KEY   = <same value as the ADMIN_KEY env var on Vercel>
#
# Throttling:
#   BATCH_LIMIT  - groups synced per request (default 12).
#   BATCH_DELAY  - ms to wait between WhatsApp fetches (default 600).
#   BATCHES      - sequential batches per run (default 5).
#   PAUSE        - seconds to wait between batches (default 60).
# With defaults: 5 x 12 = up to 60 groups per run, spread over ~6 minutes.
# Combined with the 30-min schedule that's ~120 groups/hour refreshed,
# round-robin by oldest last_synced_at so every group is reached.

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

concurrency:
  group: sync-metadata
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SITE_URL: ${{ secrets.SITE_URL }}
      ADMIN_KEY: ${{ secrets.ADMIN_KEY }}
      BATCH_LIMIT: "12"
      BATCH_DELAY: "600"
      BATCHES: "5"
      PAUSE: "60"
    steps:
      - name: Sanity check secrets
        run: |
          if [ -z "$SITE_URL" ]; then
            echo "::error::SITE_URL secret is not set"
            exit 1
          fi
          if [ -z "$ADMIN_KEY" ]; then
            echo "::error::ADMIN_KEY secret is not set"
            exit 1
          fi

      - name: Run sync in throttled batches
        run: |
          set -u
          for i in $(seq 1 "$BATCHES"); do
            echo "::group::Batch $i / $BATCHES"
            URL="${SITE_URL%/}/api/cron/sync?limit=${BATCH_LIMIT}&delay=${BATCH_DELAY}"
            HTTP_CODE=$(curl -sS -o /tmp/resp.json -w "%{http_code}" \
              -H "x-admin-key: $ADMIN_KEY" \
              --max-time 120 \
              "$URL" || echo "000")
            echo "HTTP $HTTP_CODE"
            head -c 2000 /tmp/resp.json || true
            echo ""
            echo "::endgroup::"
            if [ "$i" -lt "$BATCHES" ]; then
              echo "Sleeping ${PAUSE}s before next batch..."
              sleep "$PAUSE"
            fi
          done
