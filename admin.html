<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Admin — WhatsApp OTP Group</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box}
  body{margin:0;font-family:'Inter',system-ui,sans-serif;background:#0f172a;color:#e2e8f0}
  .container{max-width:1200px;margin:0 auto;padding:20px 16px}
  header{background:#1e293b;border-bottom:1px solid #334155;padding:18px 0}
  header h1{margin:0;font-size:20px;font-weight:800}
  header .sub{color:#94a3b8;font-size:13px;margin-top:2px}
  .key-bar{display:flex;gap:8px;margin:14px 0 8px}
  .key-bar input{flex:1;padding:10px;border:1px solid #334155;background:#0f172a;color:#e2e8f0;border-radius:8px;font:inherit}
  .btn{padding:10px 16px;border-radius:8px;border:none;font:inherit;font-weight:600;cursor:pointer;font-size:13px}
  .btn-primary{background:#25d366;color:#062b14}
  .btn-danger{background:#dc2626;color:#fff}
  .btn-warn{background:#f59e0b;color:#1a0e00}
  .btn-ghost{background:#334155;color:#e2e8f0}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .tabs{display:flex;gap:4px;margin:18px 0 12px;border-bottom:1px solid #334155}
  .tab{padding:10px 14px;cursor:pointer;font-size:14px;font-weight:600;color:#94a3b8;border-bottom:2px solid transparent}
  .tab.active{color:#25d366;border-color:#25d366}
  .badge{display:inline-block;background:#dc2626;color:#fff;border-radius:999px;padding:1px 7px;font-size:11px;margin-left:6px;font-weight:700}
  .badge-review{background:#6366f1}
  .panel{display:none}
  .panel.active{display:block}
  .row{background:#1e293b;border:1px solid #334155;border-radius:10px;padding:14px;margin-bottom:10px;display:flex;gap:12px;align-items:flex-start;flex-wrap:wrap}
  .row.review-row{border-color:#6366f155;background:#1a1a2e}
  .row.warn-row{border-color:#f59e0b44}
  .dp{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,#075e54,#25d366);flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:18px;overflow:hidden}
  .dp img{width:100%;height:100%;object-fit:cover}
  .meta{flex:1;min-width:200px}
  .meta .name{font-weight:700;font-size:15px;margin-bottom:2px}
  .meta .small{font-size:12px;color:#94a3b8;word-break:break-all}
  .meta a{color:#67e8f9}
  .actions{display:flex;gap:6px;flex-wrap:wrap}
  .pill{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:600}
  .pill.pending{background:#f59e0b22;color:#fbbf24}
  .pill.approved{background:#25d36622;color:#4ade80}
  .pill.removed{background:#dc262622;color:#fca5a5}
  .pill.review{background:#6366f122;color:#a5b4fc}
  .pill.reports{background:#dc262633;color:#fca5a5;margin-left:6px}
  .empty{padding:30px;text-align:center;color:#64748b;background:#1e293b;border-radius:10px}

  /* Reason boxes */
  .reason-box{margin-top:6px;padding:7px 11px;border-radius:6px;font-size:12px;font-weight:600;line-height:1.5}
  .reason-box.review{background:#6366f115;border-left:3px solid #6366f1;color:#c7d2fe}
  .reason-box.warn{background:#f59e0b15;border-left:3px solid #f59e0b;color:#fcd34d}
  .reason-box.removed{background:#dc262615;border-left:3px solid #dc2626;color:#fca5a5}
  .reason-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;opacity:.7;display:block;margin-bottom:2px}

  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1e293b;border:1px solid #334155;padding:10px 16px;border-radius:8px;font-size:13px;display:none;max-width:calc(100% - 40px);text-align:center}
  .toast.show{display:block}
  .ratio-bar{background:#1e293b;border:1px solid #334155;border-radius:10px;padding:14px 16px;margin-bottom:14px;font-size:13px}
  .ratio-bar .title{font-weight:700;margin-bottom:8px;color:#e2e8f0}
  .ratio-track{height:10px;border-radius:999px;background:#334155;overflow:hidden;margin:6px 0}
  .ratio-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,#25d366,#16a34a);transition:width .4s}
  .ratio-fill.over{background:linear-gradient(90deg,#f59e0b,#dc2626)}
  .ratio-labels{display:flex;justify-content:space-between;color:#94a3b8;font-size:12px}

  @media(max-width:768px){
    .container{padding:16px 14px}
    header{padding:14px 0}
    .row{padding:12px;gap:10px}
    .meta{min-width:0;flex:1 1 100%}
    .actions{flex:1 1 100%}
  }
  @media(max-width:520px){
    .container{padding:14px 12px}
    header{padding:12px 0}
    header h1{font-size:18px}
    .key-bar{flex-wrap:wrap;gap:8px}
    .key-bar input{flex:1 1 100%;min-width:0;padding:11px 12px;font-size:14px;min-height:44px}
    .key-bar .btn{flex:1 1 calc(50% - 4px);min-height:44px;padding:11px 12px}
    .tabs{margin:14px 0 10px;overflow-x:auto;-webkit-overflow-scrolling:touch;flex-wrap:nowrap;scrollbar-width:none}
    .tabs::-webkit-scrollbar{display:none}
    .tab{padding:10px 12px;font-size:13px;white-space:nowrap;flex-shrink:0}
    .row{padding:12px;gap:10px}
    .dp{width:42px;height:42px;font-size:16px}
    .meta{flex:1 1 100%;min-width:0}
    .meta .name{font-size:14px}
    .meta .small{font-size:12px}
    .actions{flex:1 1 100%;gap:6px}
    .btn{padding:10px 12px;font-size:12.5px;min-height:42px;flex:1 1 auto}
    .pill{font-size:10.5px}
    .toast{font-size:12.5px;padding:10px 14px;bottom:14px}
  }
  @media(max-width:380px){
    .container{padding:12px 10px}
    .row{padding:10px}
    .actions .btn{flex:1 1 100%}
  }
</style>
</head>
<body>

<header>
  <div class="container">
    <h1>Admin Panel</h1>
    <div class="sub">WhatsApp OTP Group · review submissions, reports & manage groups</div>
  </div>
</header>

<main class="container">
  <div class="key-bar">
    <input id="adminKey" type="password" placeholder="Admin key" autocomplete="off" />
    <button class="btn btn-primary" id="loginBtn">Load</button>
    <button class="btn btn-warn" id="cronBtn" title="Manually run the hourly verification">Run verify now</button>
    <button class="btn btn-ghost" id="dedupeBtn" title="Find and remove duplicate groups">Cleanup duplicates</button>
  </div>

  <div class="key-bar" style="margin-top:0">
    <input id="botUrl" type="text" placeholder="Bot URL (e.g. https://yourbot.fly.dev)" autocomplete="off" />
    <button class="btn btn-ghost" id="saveBotBtn">Save Bot URL</button>
  </div>


  <div class="tabs">
    <div class="tab active" data-tab="pending">Pending <span id="cPending" class="badge" style="display:none"></span></div>
    <div class="tab" data-tab="review">Review <span id="cReview" class="badge badge-review" style="display:none"></span></div>
    <div class="tab" data-tab="reports">Reports <span id="cReports" class="badge" style="display:none"></span></div>
    <div class="tab" data-tab="approved">Approved</div>
    <div class="tab" data-tab="removed">Removed</div>
    <div class="tab" data-tab="broadcast">📢 Broadcast</div>
  </div>

  <div id="panel-pending" class="panel active"></div>
  <div id="panel-review" class="panel"></div>
  <div id="panel-reports" class="panel"></div>
  <div id="panel-approved" class="panel"></div>
  <div id="panel-removed" class="panel"></div>
  <div id="panel-broadcast" class="panel"></div>
</main>

<div class="toast" id="toast"></div>

<script>
const $ = s => document.querySelector(s);
const KEY_STORAGE = 'wog_admin_key';
let key = '';

function isOtpName(name){ return name && /otp/i.test(name); } // fallback only

// Derive a human-readable reason if the DB reason is empty
function deriveReason(g){
  if(g.removedReason) return g.removedReason;
  if(g.status === 'review'){
    if(g.isOtp === false) return `Group name "${g.name}" does not contain 'OTP'. Policy: 80% of listed groups must be OTP groups.`;
    if(g.brokenSince) return `Link appears broken since ${new Date(g.brokenSince).toLocaleString()}. Sent to review for admin verification.`;
    return 'Sent to review by the automated cron check. Please verify the group link and approve or delete.';
  }
  return null;
}

function toast(msg){
  const t = $('#toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}
function escapeHtml(s){
  return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function initials(name){ if(!name) return 'G'; return name.trim().split(/\s+/).slice(0,2).map(s=>s[0]).join('').toUpperCase(); }
function dpHTML(g){
  return g.imageUrl
    ? `<div class="dp"><img src="${escapeHtml(g.imageUrl)}" onerror="this.parentNode.innerHTML='${initials(g.name)}'"></div>`
    : `<div class="dp">${initials(g.name)}</div>`;
}

async function api(path, opts={}){
  const u = new URL(path, location.origin);
  if(!opts.headers) opts.headers = {};
  opts.headers['X-Admin-Key'] = key;
  if(opts.body) opts.headers['Content-Type']='application/json';
  const r = await fetch(u, opts);
  const data = await r.json().catch(()=>({}));
  if(!r.ok) throw new Error(data.error || ('HTTP '+r.status));
  return data;
}

async function loadAll(){
  if(!key) return;
  try{
    const [groups, reports] = await Promise.all([
      api('/api/admin/groups'),
      api('/api/admin/reports'),
    ]);
    renderGroups(groups);
    renderReports(reports);
  }catch(e){
    toast('Load failed: '+e.message);
  }
}


function renderGroups(groups){
  const pending  = groups.filter(g=>g.status==='pending');
  const review   = groups.filter(g=>g.status==='review');
  const approved = groups.filter(g=>g.status==='approved');
  const removed  = groups.filter(g=>g.status==='removed');

  $('#cPending').textContent = pending.length;
  $('#cPending').style.display = pending.length ? 'inline-block' : 'none';
  $('#cReview').textContent = review.length;
  $('#cReview').style.display = review.length ? 'inline-block' : 'none';

  $('#panel-pending').innerHTML = pending.length
    ? pending.map(g=>groupRow(g,['approve','delete'])).join('')
    : '<div class="empty">No pending submissions.</div>';

  $('#panel-review').innerHTML = review.length
    ? `<div style="font-size:13px;color:#a5b4fc;margin-bottom:12px;padding:10px 14px;background:#6366f111;border-radius:8px;border:1px solid #6366f133">
         <b>Review Queue</b> — ye groups broken link, non-OTP naam, ya 20% limit ki wajah se review mein bheje gaye hain. Approve karo ya Delete karo.
       </div>` + review.map(g=>groupRow(g,['approve','delete'],true)).join('')
    : '<div class="empty">Review queue khaali hai. Sab theek hai.</div>';

  $('#panel-approved').innerHTML = approved.length
    ? approved.map(g=>groupRow(g,['remove','delete'])).join('')
    : '<div class="empty">No approved groups.</div>';

  $('#panel-removed').innerHTML = removed.length
    ? removed.map(g=>groupRow(g,['approve','delete'])).join('')
    : '<div class="empty">No removed groups.</div>';


  document.querySelectorAll('[data-action]').forEach(b=>{
    b.addEventListener('click', ()=>doAction(b.dataset.action, b.dataset.id));
  });
}

function groupRow(g, actions, isReview=false){
  const name = g.name || 'WhatsApp Group';
  const reportPill = g.reportCount ? `<span class="pill reports">${g.reportCount} report${g.reportCount>1?'s':''}</span>`:'';
  const lastChecked = g.lastCheckedAt ? new Date(g.lastCheckedAt).toLocaleString() : 'kabhi nahi';

  // Build reason box
  let reasonHtml = '';
  if(isReview || g.status==='review'){
    const reason = deriveReason(g);
    reasonHtml = `<div class="reason-box review"><span class="reason-label">📋 Review ka karan</span>${escapeHtml(reason)}</div>`;
  } else if(g.status==='pending' && g.isOtp === false){
    reasonHtml = `<div class="reason-box warn"><span class="reason-label">⚠ Dhyan dijiye</span>Is group ka naam "${escapeHtml(g.name)}" mein 'OTP' nahi hai. Policy: 80% groups OTP hone chahiye.</div>`;
  } else if(g.status==='removed'){
    const reason = g.removedReason || 'Admin ne remove kiya';
    reasonHtml = `<div class="reason-box removed"><span class="reason-label">🚫 Remove ka karan</span>${escapeHtml(reason)}${g.removedAt?` · ${new Date(g.removedAt).toLocaleString()}`:''}</div>`;
  }

  const btns = actions.map(a=>{
    if(a==='approve') return `<button class="btn btn-primary" data-action="approve" data-id="${g.id}">Approve</button>`;
    if(a==='remove')  return `<button class="btn btn-warn"   data-action="remove"  data-id="${g.id}">Remove</button>`;
    if(a==='delete')  return `<button class="btn btn-danger" data-action="delete"  data-id="${g.id}">Delete</button>`;
  }).join('');

  const rowClass = isReview ? 'row review-row' : (g.status==='pending' && g.isOtp === false ? 'row warn-row' : 'row');

  return `
    <div class="${rowClass}">
      ${dpHTML({...g,name})}
      <div class="meta">
        <div class="name">${escapeHtml(name)} <span class="pill ${g.status}">${g.status}</span>${reportPill}</div>
        ${reasonHtml}
        ${g.description?`<div class="small" style="margin-top:4px">Description: ${escapeHtml(g.description)}</div>`:''}
        <div class="small"><a href="${escapeHtml(g.link)}" target="_blank">${escapeHtml(g.link)}</a></div>
        <div class="small">Last checked: ${lastChecked} · Submit: ${new Date(g.createdAt).toLocaleString()}</div>
      </div>
      <div class="actions">${btns}</div>
    </div>`;
}

function renderReports(reports){
  $('#cReports').textContent = reports.length;
  $('#cReports').style.display = reports.length ? 'inline-block' : 'none';
  $('#panel-reports').innerHTML = reports.length
    ? reports.map(r=>reportRow(r)).join('')
    : '<div class="empty">Koi report nahi.</div>';
  document.querySelectorAll('[data-rep-action]').forEach(b=>{
    b.addEventListener('click', ()=>doReportAction(b.dataset.repAction, b.dataset.id, b.dataset.gid));
  });
}

function reportRow(r){
  const g = r.group;
  return `
    <div class="row">
      ${dpHTML(g)}
      <div class="meta">
        <div class="name">${escapeHtml(g.name||'WhatsApp Group')} <span class="pill ${g.status}">${g.status}</span></div>
        <div class="reason-box warn"><span class="reason-label">⚠ Report ka karan</span>${escapeHtml(r.reason)}${r.details?`<br><i>"${escapeHtml(r.details)}"</i>`:''}</div>
        <div class="small"><a href="${escapeHtml(g.link)}" target="_blank">${escapeHtml(g.link)}</a></div>
        <div class="small">Reported: ${new Date(r.createdAt).toLocaleString()}</div>
      </div>
      <div class="actions">
        <button class="btn btn-warn" data-rep-action="remove-group" data-gid="${r.groupId}">Remove group</button>
        <button class="btn btn-ghost" data-rep-action="dismiss" data-id="${r.id}">Dismiss</button>
        <button class="btn btn-ghost" data-rep-action="clear-all" data-gid="${r.groupId}">Clear all reports</button>
      </div>
    </div>`;
}

async function doAction(action, id){
  if(action==='delete' && !confirm('Is group ko permanently delete karo?')) return;
  let reason;
  if(action==='remove'){
    reason = prompt('Remove karne ka karan?', 'Admin ne remove kiya');
    if(reason === null) return;
  }
  try{
    const body = { action, groupId: Number(id) };
    if(reason !== undefined) body.reason = reason || 'Admin ne remove kiya';
    await api('/api/admin/action',{method:'POST',body:JSON.stringify(body)});
    toast('Ho gaya!');
    loadAll();
  }catch(e){ toast('Failed: '+e.message); }
}

async function doReportAction(action, id, gid){
  try{
    if(action==='dismiss'){
      await api('/api/admin/action',{method:'POST',body:JSON.stringify({action:'dismiss-report',reportId:Number(id)})});
    } else if(action==='clear-all'){
      await api('/api/admin/action',{method:'POST',body:JSON.stringify({action:'clear-reports',groupId:Number(gid)})});
    } else if(action==='remove-group'){
      const reason = prompt('Remove karne ka karan?', 'User report ke baad remove kiya');
      if(reason === null) return;
      await api('/api/admin/action',{method:'POST',body:JSON.stringify({action:'remove',groupId:Number(gid),reason:reason||'User report ke baad remove kiya'})});
    }
    toast('Ho gaya!');
    loadAll();
  }catch(e){ toast('Failed: '+e.message); }
}

document.querySelectorAll('.tab').forEach(t=>{
  t.addEventListener('click', ()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    $('#panel-'+t.dataset.tab).classList.add('active');
    if(t.dataset.tab==='broadcast') loadBroadcastStatus();
  });
});

$('#loginBtn').addEventListener('click', ()=>{
  key = $('#adminKey').value.trim();
  if(!key) return toast('Admin key daalo');
  localStorage.setItem(KEY_STORAGE, key);
  loadAll();
});

$('#cronBtn').addEventListener('click', async ()=>{
  if(!key) return toast('Pehle admin key daalo');
  if(!confirm('Abhi verification chalao? Non-OTP aur broken groups Review mein bheje jayenge (remove nahi honge).')) return;
  $('#cronBtn').disabled = true;
  $('#cronBtn').textContent = 'Chal raha hai…';
  try{
    const r = await fetch('/api/cron/verify?key='+encodeURIComponent(key));
    const data = await r.json();
    if(!r.ok) throw new Error(data.error||'Failed');
    toast(`Check kiye: ${data.checked||0} · Review mein bheje: ${data.sentToReview||0}`);
    loadAll();
  }catch(e){ toast('Failed: '+e.message); }
  finally{ $('#cronBtn').disabled=false; $('#cronBtn').textContent='Run verify now'; }
});

$('#dedupeBtn').addEventListener('click', async ()=>{
  if(!key) return toast('Pehle admin key daalo');
  if(!confirm('Duplicate groups dhundho aur nayi copies remove karo? Sabse purani copy rakhi jayegi.')) return;
  $('#dedupeBtn').disabled = true;
  $('#dedupeBtn').textContent = 'Scan ho raha hai…';
  try{
    const r = await fetch('/api/admin/action',{
      method:'POST',
      headers:{'Content-Type':'application/json','X-Admin-Key':key},
      body:JSON.stringify({action:'dedupe-names'})
    });
    const data = await r.json();
    if(!r.ok) throw new Error(data.error||'Failed');
    toast(`Scan: ${data.scanned} · Duplicate sets: ${data.duplicateGroups} · Remove: ${data.removed}`);
    loadAll();
  }catch(e){ toast('Failed: '+e.message); }
  finally{ $('#dedupeBtn').disabled=false; $('#dedupeBtn').textContent='Cleanup duplicates'; }
});

const saved = localStorage.getItem(KEY_STORAGE);
if(saved){ key = saved; $('#adminKey').value = saved; loadAll(); }

const BOT_URL_KEY = 'wog_bot_url';
let botUrl = '';

function renderBroadcast(status) {
  const lastAt = status && status.lastAt ? new Date(status.lastAt).toLocaleString() : 'Kabhi nahi';
  const msgVal = status && status.message ? escapeHtml(status.message) : '';
  const running = status && status.running;
  $('#panel-broadcast').innerHTML =
    '<div class="row" style="flex-direction:column;gap:12px">' +
      '<div style="font-weight:700;font-size:15px">📢 Daily Broadcast Settings</div>' +
      '<div class="reason-box review" style="font-size:12px;margin-bottom:0">' +
        '<span class="reason-label">Kaise kaam karta hai</span>' +
        'Bot har roz 10:00 AM IST par sabhi approved groups mein message bhejta hai. ' +
        'Har group ke beech 5 second ka gap hota hai. Aap yahan message set karke manual broadcast bhi trigger kar sakte hain.' +
      '</div>' +
      '<div style="font-size:13px;color:#94a3b8">' +
        'Last broadcast: <b style="color:#e2e8f0">' + lastAt + '</b> | ' +
        'Sent: <b style="color:#e2e8f0">' + (status ? status.lastSent : 0) + ' / ' + (status ? status.lastTotal : 0) + '</b>' +
        (running ? ' <span style="color:#f59e0b">(Chal raha hai…)</span>' : '') +
      '</div>' +
    '</div>' +
    '<div class="row" style="flex-direction:column;gap:10px">' +
      '<div style="font-weight:700;font-size:14px">Broadcast Message</div>' +
      '<textarea id="broadcastMsg" rows="5" ' +
        'style="width:100%;background:#0f172a;border:1px solid #334155;border-radius:8px;' +
        'color:#e2e8f0;padding:10px;font:inherit;resize:vertical" ' +
        'placeholder="Yahan apna daily message likhein…">' + msgVal + '</textarea>' +
      '<div style="display:flex;gap:8px;flex-wrap:wrap">' +
        '<button class="btn btn-primary" onclick="setMessage()">✓ Message Save Karo</button>' +
        '<button class="btn btn-warn" onclick="sendBroadcastNow()">🚀 Abhi Bhejo (Manual)</button>' +
        '<button class="btn btn-ghost" onclick="loadBroadcastStatus()">↻ Refresh Status</button>' +
      '</div>' +
    '</div>';
}

async function botApi(path, opts) {
  opts = opts || {};
  if (!botUrl) { toast('Pehle Bot URL save karo'); return null; }
  if (!opts.headers) opts.headers = {};
  opts.headers['X-Bot-Key'] = key;
  if (opts.body) opts.headers['Content-Type'] = 'application/json';
  const r = await fetch(botUrl.replace(/\/+$/, '') + path, opts);
  const data = await r.json().catch(function(){ return {}; });
  if (!r.ok) throw new Error(data.error || ('HTTP ' + r.status));
  return data;
}

async function loadBroadcastStatus() {
  try {
    const status = await botApi('/broadcast/status');
    if (status) renderBroadcast(status);
  } catch(e) {
    $('#panel-broadcast').innerHTML = '<div class="empty">Bot se connect nahi ho pa raha: ' + escapeHtml(e.message) + '<br><small>Bot URL check karo aur ensure karo bot chal raha hai.</small></div>';
  }
}

async function setMessage() {
  const el = $('#broadcastMsg');
  if (!el) return;
  const msg = el.value.trim();
  if (!msg) return toast('Message khaali nahi hona chahiye');
  try {
    await botApi('/set-message', { method: 'POST', body: JSON.stringify({ message: msg }) });
    toast('Message save ho gaya!');
    loadBroadcastStatus();
  } catch(e) { toast('Failed: ' + e.message); }
}

async function sendBroadcastNow() {
  if (!confirm('Abhi SABHI approved groups mein message bhejein? Har group ke beech 5 second lagenge.')) return;
  try {
    await botApi('/broadcast', { method: 'POST' });
    toast('Broadcast shuru ho gaya! Background mein chal raha hai.');
    setTimeout(loadBroadcastStatus, 3000);
  } catch(e) { toast('Failed: ' + e.message); }
}



$('#saveBotBtn').addEventListener('click', function() {
  const u = $('#botUrl').value.trim();
  if (!u) return toast('Bot URL daalo');
  botUrl = u;
  localStorage.setItem(BOT_URL_KEY, botUrl);
  toast('Bot URL save ho gaya!');
});

const savedBot = localStorage.getItem(BOT_URL_KEY);
if (savedBot) { botUrl = savedBot; $('#botUrl').value = savedBot; }
renderBroadcast(null);

</script>
